name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet restore ./cdr-api.sln
      - run: dotnet build ./cdr-api.sln -c Release --no-restore
      - run: dotnet test ./tests/Cdr.Tests/Cdr.Tests.csproj -c Release --no-build
      - run: dotnet test ./tests/Cdr.IntegrationTests/Cdr.IntegrationTests.csproj -c Release --no-build